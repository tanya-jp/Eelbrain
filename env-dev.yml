# Environment for development
# usage: $ mamba env create --file=env-dev.yml
name: eeldev
channels:
- conda-forge
dependencies:
- python >= 3.11
# packaging
- pip
- packaging
- twine
# Scientific Python base
- libcblas
- libclang
- numpy >= 1.20
- scipy >= 1.5
- matplotlib-base >= 3.8
- seaborn
- pymatreader
- pillow
# OS integration
- appnope
- psutil
# mne-python
- mne >= 1
- h5py
- pandas
- statsmodels
- joblib
# Eelbrain additions
- ipdb
- ipython
- colormath >= 2.1
- tqdm >= 4.40
- keyring >= 5
- wxpython >= 4.0.3, != 4.1.0  # double install of libraries
# building
- setuptools >= 17
- cython >= 3
# docs
- sphinx >= 3
- sphinx-gallery
- sphinx_rtd_theme
- sphinxcontrib-bibtex
- pydocstyle
# testing
- pre-commit
- pytest
- pytest-cov
- pytest-faulthandler
- pingouin >= 0.6.0  # breaking API used in tests
#- pytest-sugar  # errors on Linux
# plotting brains
- nibabel >= 2.5
- mayavi >= 4.6.2  # conda-forge pinning faulty
- vtk >= 8.1.1
- pysurfer >= 0.11.2
- nilearn >=0.10.4
- pyface != 7.2.0  # 7.2.0 causes RuntimeError: No traitsui.toolkits plugin could be loaded for wx
- mne-bids >= 0.17
